<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弹幕语义聚类 — 前端版 (transformers.js)</title>
<style>
  :root {
    --bg: #ffffff; --card: #f6f8fa; --border: #d0d7de;
    --text: #1f2328; --muted: #656d76; --accent: #0969da;
    --green: #1a7f37; --orange: #bf8700; --red: #cf222e; --purple: #8250df;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }
  .topbar {
    display:flex; align-items:center; gap:24px; padding:10px 16px;
    background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .topbar h1 { font-size:18px; color:var(--accent); white-space:nowrap; }
  .stat { display:flex; align-items:baseline; gap:6px; font-size:13px; }
  .stat .val { font-size:20px; font-weight:700; color:var(--accent); }
  .stat .label { color:var(--muted); }
  .sep { color:var(--border); }
  .status-badge {
    font-size:11px; padding:2px 8px; border-radius:10px;
    background:rgba(9,105,218,0.1); color:var(--accent); font-weight:600;
  }

  .main {
    display:grid; grid-template-columns:1fr 1fr 3fr; gap:1px;
    background:var(--border); flex:1; overflow:hidden; min-height:0;
  }
  .col { background:var(--bg); display:flex; flex-direction:column; overflow:hidden; min-width:0; }
  .col-header {
    padding:8px 12px; font-size:13px; font-weight:600;
    background:var(--card); border-bottom:1px solid var(--border);
    flex-shrink:0; display:flex; justify-content:space-between; align-items:center;
  }
  .col-header .count { font-size:11px; color:var(--muted); font-weight:400; }
  .col-body { flex:1; overflow-y:auto; padding:4px 0; min-height:0; }

  .entry {
    padding:5px 12px; font-size:12px; border-bottom:1px solid rgba(48,54,61,0.5);
    display:flex; gap:6px; align-items:flex-start;
  }
  .entry .idx { color:var(--muted); font-size:10px; min-width:24px; text-align:right; flex-shrink:0; }
  .entry .txt { word-break:break-all; flex:1; }
  .entry .tag {
    font-size:10px; padding:0 5px; border-radius:3px; flex-shrink:0;
    background:rgba(88,166,255,0.15); color:var(--accent);
  }
  .entry.new .tag { background:rgba(63,185,80,0.15); color:var(--green); }

  .cluster-card {
    margin:2px; padding:6px 8px; background:var(--card);
    border:1px solid var(--border); border-radius:6px; font-size:13px;
    display:flex; flex-direction:column; overflow:hidden; min-height:0;
  }
  .cluster-card .head { display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .cluster-card .canonical {
    font-weight:700; color:var(--accent);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:14px;
  }
  .cluster-card .cnt { font-size:11px; color:var(--green); flex-shrink:0; margin-left:4px; }
  .cluster-card .members { color:var(--muted); font-size:11px; line-height:1.4; overflow:hidden; flex:1; min-height:0; }
  .cluster-card .member {
    display:inline-block; background:rgba(163,113,247,0.12); color:var(--purple);
    padding:0 4px; border-radius:3px; margin:1px 2px 1px 0;
    word-break:break-all; max-width:100%;
  }
  .cluster-card .canonical {
    word-break:break-all;
  }

  .ctrlbar {
    display:flex; align-items:center; gap:20px; padding:6px 16px;
    background:var(--card); border-bottom:1px solid var(--border);
    flex-shrink:0; font-size:12px;
  }
  .ctrlbar label { color:var(--muted); white-space:nowrap; }
  .ctrlbar input[type=range] { width:120px; accent-color:var(--accent); }
  .ctrlbar .val { color:var(--accent); font-weight:600; min-width:32px; }
  .ctrlbar input[type=text], .ctrlbar input[type=file] {
    flex:1; max-width:260px; padding:4px 8px; font-size:12px;
    border:1px solid var(--border); border-radius:4px; background:var(--bg); color:var(--text);
    outline:none;
  }
  .ctrlbar input[type=text]:focus { border-color:var(--accent); }
  .ctrlbar button {
    padding:4px 12px; font-size:12px; background:var(--accent); color:#fff;
    border:none; border-radius:4px; cursor:pointer;
  }
  .ctrlbar button:hover { opacity:0.85; }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* Setup Modal */
  .overlay {
    display: flex; position:fixed; inset:0; z-index:1000;
    background:rgba(0,0,0,0.5); align-items:center; justify-content:center;
  }
  .modal {
    background:var(--bg); border-radius:12px; padding:32px;
    max-width:480px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size:20px; margin-bottom:8px; }
  .modal .sub { font-size:13px; color:var(--muted); margin-bottom:24px; line-height:1.5; }
  .modal .btn-row { display:flex; gap:12px; margin-bottom:16px; }
  .modal button.big {
    flex:1; padding:16px 12px; border:2px solid var(--border); border-radius:8px;
    background:var(--card); cursor:pointer; font-size:14px; text-align:center; transition:border-color .2s;
  }
  .modal button.big:hover { border-color:var(--accent); }
  .modal button.big .icon { font-size:28px; display:block; margin-bottom:6px; }
  .modal button.big:disabled { opacity:0.5; cursor:not-allowed; }
  .modal .status { font-size:13px; color:var(--muted); margin-top:12px; min-height:20px; }
  .modal .progress { font-size:12px; color:var(--accent); margin-top:4px; display:none; }
  .modal .file-list { margin-top:12px; display:none; padding:8px; background:var(--card); border-radius:6px; }
  .modal .link { color:var(--accent); word-break:break-all; font-size:11px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>弹幕语义聚类</h1>
  <span class="sep">|</span>
  <div class="stat"><span class="val" id="st_ingested">0</span><span class="label">摄入</span></div>
  <div class="stat"><span class="val" id="st_unique">0</span><span class="label">唯一</span></div>
  <div class="stat"><span class="val" id="st_clusters">0</span><span class="label">聚类</span></div>
  <div class="stat"><span class="val" id="st_slots">40</span><span class="label">槽位</span></div>
  <span class="sep">|</span>
  <div class="stat"><span class="label">簇心阈值</span><span class="val" style="font-size:14px" id="st_ct">0.40</span></div>
  <div class="stat"><span class="label">锚点阈值</span><span class="val" style="font-size:14px" id="st_at">0.60</span></div>
  <span class="sep">|</span>
  <div class="stat"><span class="label">缓存命中</span><span class="val" style="font-size:14px" id="st_cache">—</span></div>
  <span class="sep">|</span>
  <div class="status-badge" id="model_status">Loading...</div>
  <span class="sep">|</span>
  <button id="btn_settings" style="padding:4px 12px;font-size:12px;background:var(--card);color:var(--accent);border:1px solid var(--border);border-radius:4px;cursor:pointer">⚙ 设置</button>
</div>

<div class="ctrlbar">
  <span style="color:var(--muted)">聚类粒度</span>
  <label>簇心</label>
  <input type="text" id="in_ct" value="0.40" style="width:55px;padding:2px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);text-align:center;">
  <label>锚点</label>
  <input type="text" id="in_at" value="0.60" style="width:55px;padding:2px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);text-align:center;">
  <button id="apply_threshold">应用</button>
  <span style="color:var(--muted)">|</span>
  <label>卡片宽</label>
  <input type="range" id="card_width" min="160" max="500" value="280" style="width:80px;">
  <span style="font-size:11px;color:var(--muted)" id="card_width_val">280px</span>
  <span style="flex:1"></span>
  <input type="text" id="manual_input" placeholder="手写弹幕，回车发送…" maxlength="128">
  <button id="manual_send">发送</button>
  <span style="color:var(--muted)">|</span>
  <input type="file" id="file_input" accept=".csv,.txt" style="font-size:11px;">
  <span style="font-size:10px;color:var(--muted)" id="bulk_status"></span>
</div>

<div class="ctrlbar" id="perm_bar" style="font-size:11px;gap:6px;min-height:28px;display:none;overflow-x:auto;overflow-y:hidden;white-space:nowrap;"></div>

<div class="main">
  <div class="col">
    <div class="col-header">原始弹幕 <span class="count" id="cnt_raw">0</span></div>
    <div class="col-body" id="raw_list"></div>
  </div>
  <div class="col">
    <div class="col-header">预处理后 <span class="count" id="cnt_pre">0</span></div>
    <div class="col-body" id="pre_list"></div>
  </div>
  <div class="col">
    <div class="col-header">语义聚类 <span class="count" id="cnt_clu">0</span></div>
    <div class="col-body" id="clu_grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:2px;grid-auto-rows:1fr;"></div>
  </div>
</div>

<!-- Model Setup Modal -->
<div class="overlay" id="setup_overlay">
  <div class="modal">
    <h2>🔧 模型加载</h2>
    <div class="sub">
      需要 BGE-small-zh-v1.5 模型 (~90MB) 才能运行。<br>
      选择一种方式加载模型:
    </div>
    <div class="btn-row">
      <button class="big" id="btn_auto">
        <span class="icon">🌐</span>
        自动下载
      </button>
      <button class="big" id="btn_manual">
        <span class="icon">📁</span>
        手动选择文件夹
      </button>
    </div>
    <div class="status" id="setup_status"></div>
    <div class="progress" id="setup_progress"></div>
    <div class="file-list" id="file_checklist_area">
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">
        手动下载: <a class="link" href="https://huggingface.co/Xenova/bge-small-zh-v1.5/tree/main" target="_blank">https://huggingface.co/Xenova/bge-small-zh-v1.5</a><br>
        下载后选择模型文件夹即可
      </div>
      <div id="file_checklist"></div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="overlay" id="settings_overlay" style="display:none">
  <div class="modal" style="max-width:560px;max-height:85vh;overflow-y:auto">
    <h2>⚙ 设置</h2>
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:16px;font-size:13px">

      <!-- 连接 -->
      <fieldset style="border:1px solid var(--border);border-radius:6px;padding:10px 14px">
        <legend style="font-weight:600;color:var(--accent)">连接</legend>
        <div style="margin-bottom:8px">
          <label style="color:var(--muted);display:block;margin-bottom:2px">Bridge 地址</label>
          <input type="text" id="cfg_bridge_url" placeholder="ws://localhost:9696" style="width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px">
        </div>
        <div>
          <label style="color:var(--muted);display:block;margin-bottom:2px">Token (可选)</label>
          <input type="text" id="cfg_bridge_token" placeholder="留空" style="width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px">
        </div>
      </fieldset>

      <!-- 预处理 -->
      <fieldset style="border:1px solid var(--border);border-radius:6px;padding:10px 14px">
        <legend style="font-weight:600;color:var(--accent)">预处理</legend>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div>
            <label style="color:var(--muted);display:block;margin-bottom:2px">最短文本 (字符)</label>
            <input type="number" id="cfg_min_text" min="1" max="10" value="1" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px">
          </div>
          <div>
            <label style="color:var(--muted);display:block;margin-bottom:2px">最长文本 (字符)</label>
            <input type="number" id="cfg_max_text" min="10" max="512" value="128" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px">
          </div>
          <div>
            <label style="color:var(--muted);display:block;margin-bottom:2px">SimHash 海明距离</label>
            <input type="number" id="cfg_simhash_dist" min="1" max="10" value="2" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px">
          </div>
          <div>
            <label style="color:var(--muted);display:block;margin-bottom:2px">SimHash 最短文本</label>
            <input type="number" id="cfg_simhash_min" min="4" max="20" value="8" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px">
          </div>
        </div>
        <div style="margin-top:8px">
          <label style="color:var(--muted);display:block;margin-bottom:2px">变体词 (JSON 文件)</label>
          <input type="file" id="cfg_variants_file" accept=".json" style="font-size:11px">
          <span id="cfg_variants_status" style="font-size:11px;color:var(--muted);display:block;margin-top:2px">格式: {"xswl":"笑死我了"}</span>
        </div>
      </fieldset>

      <!-- 嵌入 -->
      <fieldset style="border:1px solid var(--border);border-radius:6px;padding:10px 14px">
        <legend style="font-weight:600;color:var(--accent)">嵌入 &amp; 缓存</legend>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div>
            <label style="color:var(--muted);display:block;margin-bottom:2px">缓存 TTL (秒)</label>
            <input type="number" id="cfg_cache_ttl" min="60" max="7200" value="600" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px">
          </div>
          <div>
            <label style="color:var(--muted);display:block;margin-bottom:2px">缓存最大条目</label>
            <input type="number" id="cfg_cache_size" min="1000" max="100000" value="50000" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px">
          </div>
          <div>
            <label style="color:var(--muted);display:block;margin-bottom:2px">批量编码大小</label>
            <input type="number" id="cfg_batch_size" min="1" max="128" value="32" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px">
          </div>
          <div>
            <label style="color:var(--muted);display:block;margin-bottom:2px">模型 (HF repo)</label>
            <input type="text" id="cfg_model_name" value="Xenova/bge-small-zh-v1.5" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px">
          </div>
        </div>
      </fieldset>

      <!-- 聚类 -->
      <fieldset style="border:1px solid var(--border);border-radius:6px;padding:10px 14px">
        <legend style="font-weight:600;color:var(--accent)">聚类</legend>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><label style="color:var(--muted);display:block;margin-bottom:2px">簇心阈值 <b id="cfg_ct_val">0.40</b></label>
            <input type="range" id="cfg_ct" min="0.01" max="0.99" step="0.01" value="0.40" style="width:100%"></div>
          <div><label style="color:var(--muted);display:block;margin-bottom:2px">锚点阈值 <b id="cfg_at_val">0.60</b></label>
            <input type="range" id="cfg_at" min="0.01" max="0.99" step="0.01" value="0.60" style="width:100%"></div>
          <div><label style="color:var(--muted);display:block;margin-bottom:2px">最大槽位</label>
            <input type="number" id="cfg_max_slots" min="10" max="100" value="40" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px"></div>
          <div><label style="color:var(--muted);display:block;margin-bottom:2px">维护间隔 (条)</label>
            <input type="number" id="cfg_maint_interval" min="50" max="1000" value="300" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px"></div>
          <div><label style="color:var(--muted);display:block;margin-bottom:2px">合并阈值 <b id="cfg_merge_val">0.92</b></label>
            <input type="range" id="cfg_merge" min="0.5" max="0.99" step="0.01" value="0.92" style="width:100%"></div>
          <div><label style="color:var(--muted);display:block;margin-bottom:2px">拆分阈值 <b id="cfg_split_val">0.50</b></label>
            <input type="range" id="cfg_split" min="0.1" max="0.8" step="0.01" value="0.50" style="width:100%"></div>
          <div><label style="color:var(--muted);display:block;margin-bottom:2px">热点提升阈值</label>
            <input type="number" id="cfg_perm_threshold" min="10" max="1000" value="100" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px"></div>
          <div><label style="color:var(--muted);display:block;margin-bottom:2px">热点 TTL (秒)</label>
            <input type="number" id="cfg_perm_ttl" min="60" max="7200" value="600" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px"></div>
          <div><label style="color:var(--muted);display:block;margin-bottom:2px">热点簇心<b id="cfg_pct_val">0.75</b></label>
            <input type="range" id="cfg_pct" min="0.5" max="0.99" step="0.01" value="0.75" style="width:100%"></div>
          <div><label style="color:var(--muted);display:block;margin-bottom:2px">热点锚点<b id="cfg_pat_val">0.82</b></label>
            <input type="range" id="cfg_pat" min="0.5" max="0.99" step="0.01" value="0.82" style="width:100%"></div>
        </div>
      </fieldset>

    </div>
    <div style="margin-top:20px;display:flex;gap:12px">
      <button id="btn_save_settings" style="flex:1;padding:8px;font-size:14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer">保存设置</button>
      <button id="btn_close_settings" style="flex:1;padding:8px;font-size:14px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer">取消</button>
    </div>
    <button id="btn_settings_connect" style="width:100%;margin-top:8px;padding:8px;font-size:14px;background:var(--green);color:#fff;border:none;border-radius:6px;cursor:pointer">保存设置并连接 Bridge</button>
    <button id="btn_reset_settings" style="width:100%;margin-top:4px;padding:6px;font-size:12px;background:transparent;color:var(--red);border:1px solid var(--red);border-radius:6px;cursor:pointer">恢复默认设置</button>
  </div>
</div>

<!-- Hidden directory picker -->
<input type="file" id="dir_picker" webkitdirectory style="display:none">

<script type="module" src="/src/main.ts"></script>
</body>
</html>
